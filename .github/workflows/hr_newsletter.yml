name: HR Strategic Newsletter

# Daily 06:00 Taiwan — GitHub Actions schedule (no Power Automate Premium required).
# See docs/hr_schedule_setup.md. repository_dispatch kept for optional manual triggers.

on:
  schedule:
    - cron: "0 6 * * *"
      timezone: Asia/Taipei
  workflow_dispatch:
  repository_dispatch:
    types: [hr-newsletter-daily]

jobs:
  send-hr-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify HR webhook secret
        env:
          HR_TEAMS_WEBHOOK_URL: ${{ secrets.HR_TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$HR_TEAMS_WEBHOOK_URL" ]; then
            echo "::error::HR_TEAMS_WEBHOOK_URL secret is not set."
            echo "Add the Power Automate HTTP POST URL in"
            echo "Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          if ! echo "$HR_TEAMS_WEBHOOK_URL" | grep -q 'powerplatform.com\|powerautomate'; then
            echo "::error::HR_TEAMS_WEBHOOK_URL must be a Power Automate webhook URL, not a Teams channel webhook."
            exit 1
          fi

      - name: Verify Gemini API secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
        run: |
          if [ "$AI_PROVIDER" = "gemini" ] && [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is not set."
            echo "Add your Gemini API key at Settings → Secrets → Actions."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Preflight Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
        run: |
          if [ "$AI_PROVIDER" != "gemini" ]; then
            echo "Skipping Gemini preflight (AI_PROVIDER=$AI_PROVIDER)"
            exit 0
          fi
          python - <<'PY'
          import os, sys
          import requests

          key = os.environ.get("GEMINI_API_KEY", "")
          model = os.environ.get("GEMINI_MODEL", "gemini-3.5-flash")
          if not key:
              print("::error::GEMINI_API_KEY is empty")
              sys.exit(1)

          url = (
              f"https://generativelanguage.googleapis.com/v1beta/models/"
              f"{model}:generateContent?key={key}"
          )
          payload = {
              "contents": [{"parts": [{"text": "Reply with OK only."}]}],
              "generationConfig": {"maxOutputTokens": 16, "temperature": 0},
          }
          r = requests.post(url, json=payload, timeout=30)
          print(f"Gemini preflight status: {r.status_code}")
          print(r.text[:800])
          if not r.ok:
              print("::error::Gemini API preflight failed — check GEMINI_API_KEY and GEMINI_MODEL")
              sys.exit(1)
          print("Gemini preflight OK")
          PY

      - name: Generate and send HR newsletter to Teams
        env:
          HR_TEAMS_WEBHOOK_URL: ${{ secrets.HR_TEAMS_WEBHOOK_URL }}
          HR_TEAMS_WEBHOOK_URL_EXTRA: ${{ secrets.HR_TEAMS_WEBHOOK_URL_EXTRA }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          TEAMS_WEBHOOK_FORMAT: ${{ vars.TEAMS_WEBHOOK_FORMAT || 'auto' }}
        run: python hr_main.py
